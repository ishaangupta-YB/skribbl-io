name = "skribbl-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Default to the Cloudflare workers.dev subdomain on first deploy.
# To use a custom domain, add a `routes` or `workers_dev = false` block here
# after creating the DNS route in the Cloudflare dashboard.
workers_dev = true

# One Durable Object per room (idFromName(roomId)) — authoritative state,
# hibernating WebSockets, and alarm-driven turn timers all live here.
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

# SQLite-backed DO storage is required for per-test storage isolation in
# @cloudflare/vitest-pool-workers and is the current recommended default.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# D1: word packs (bundled defaults are seeded; custom packs added at runtime)
# and the public lobby registry that powers GET /api/rooms.
# Create with: wrangler d1 create skribbl  (paste the id below)
[[d1_databases]]
binding = "DB"
database_name = "skribbl"
database_id = "70709d68-2afa-4087-83cf-ceff75ad074a"
migrations_dir = "migrations"

# KV: cached public lobby list + per-IP rate limiting on room creation.
# Create with: wrangler kv namespace create skribbl-kv  (paste the id below)
[[kv_namespaces]]
binding = "KV"
id = "c9094778b8ca409fa4827dfc1a7261b3"

# Public env vars (not secrets). ALLOWED_ORIGINS is the CORS allow-list for the
# REST endpoints (room create/list). It is locked to the production Cloudflare
# Pages web origin. Native apps send no Origin header and are unaffected; other
# websites are blocked by the browser. If you rename the Pages project or add a
# custom domain, update this to match (comma-separated for multiple origins).
[vars]
ALLOWED_ORIGINS = "https://skribbl-cloud.pages.dev"

[observability]
enabled = true
