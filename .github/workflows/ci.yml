name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- typecheck + lint + unit tests (fast, no external deps) ----
  check:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ---- backend DO tests (vitest-pool-workers, miniflare) ----
  backend-tests:
    name: Backend DO tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Backend tests (game, REST, edge cases, security)
        working-directory: apps/api
        run: pnpm test

  # ---- frontend QA unit tests (canvas lib, realtime client) ----
  frontend-tests:
    name: Frontend QA tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Frontend game-logic tests
        working-directory: apps/mobile
        run: pnpm vitest run --config features/game/vitest.config.ts

      - name: Frontend QA tests (canvas + realtime)
        working-directory: apps/mobile
        run: pnpm vitest run --config vitest.qa.config.ts

  # ---- E2E tests package (typecheck + protocol E2E) ----
  e2e-tests:
    name: E2E tests package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Typecheck tests package
        working-directory: tests
        run: pnpm typecheck

      - name: E2E playthrough (wrangler dev)
        working-directory: tests
        run: pnpm test:e2e

  # ---- Playwright web E2E (2-client game through the real UI) ----
  playwright-e2e:
    name: Playwright web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Playwright E2E
        env:
          EXPO_PUBLIC_WS_URL: ws://localhost:8787
        run: bash ./tests/e2e/run-playwright-ci.sh

  # ---- react-doctor on the mobile app ----
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: React Doctor
        working-directory: apps/mobile
        run: npx -y react-doctor@latest . --verbose
        continue-on-error: true
