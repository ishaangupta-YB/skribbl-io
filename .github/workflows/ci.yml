name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- typecheck + lint + unit tests (fast, no external deps) ----
  check:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ---- backend DO tests (vitest-pool-workers, miniflare) ----
  backend-tests:
    name: Backend DO tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Backend tests (game, REST, edge cases, security)
        working-directory: apps/api
        run: pnpm test

  # ---- frontend QA unit tests (canvas lib, realtime client) ----
  frontend-tests:
    name: Frontend QA tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: Frontend game-logic tests
        working-directory: apps/mobile
        run: pnpm vitest run --config features/game/vitest.config.ts

      - name: Frontend QA tests (canvas + realtime)
        working-directory: apps/mobile
        run: pnpm vitest run --config vitest.qa.config.ts

  # ---- E2E playthrough against wrangler dev (protocol-level) ----
  e2e:
    name: E2E playthrough (wrangler dev)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: E2E playthrough
        run: node_modules/.bin/vitest run --config tests/e2e/vitest.config.ts

  # ---- react-doctor on the mobile app ----
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build

      - name: React Doctor
        working-directory: apps/mobile
        run: npx -y react-doctor@latest . --verbose
        continue-on-error: true
