name: Deploy

# Production deploys run via the Cloudflare dashboard Git integration
# (Workers Builds for the API + Cloudflare Pages for the web app) — see
# docs/deploy.md. This workflow is kept ONLY as a manual fallback and does NOT
# run on push, so it never double-deploys against the Cloudflare Git build.
# To use it manually (Actions tab -> Run workflow), the repo must define the
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID and EXPO_PUBLIC_WS_URL secrets.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Deploy Worker + DO + D1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build

      - name: Typecheck & test
        run: pnpm typecheck && pnpm test

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply skribbl

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  web:
    name: Deploy web to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: api
    defaults:
      run:
        working-directory: apps/mobile
    env:
      EXPO_PUBLIC_WS_URL: ${{ secrets.EXPO_PUBLIC_WS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build

      - name: Export web build
        run: pnpm export:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/mobile
          command: pages deploy dist --project-name skribbl-cloud --branch=main
